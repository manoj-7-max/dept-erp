<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - Bulk Importer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">ERP CSV Importer</h1>
            <p class="text-gray-500 text-sm">Upload Student & Attendance Data direct to MongoDB.</p>
        </div>

        <form id="uploadForm" class="space-y-6">
            <!-- Action Dropzone -->
            <label class="block w-full border-2 border-dashed border-blue-200 rounded-xl bg-blue-50/50 hover:bg-blue-50 transition cursor-pointer group">
                <div class="py-12 px-6 flex flex-col items-center">
                    <svg class="w-10 h-10 text-blue-500 mb-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm font-semibold text-blue-600">Click to Browse matching CSV files</p>
                    <p class="text-xs text-gray-400 mt-1" id="fileName">No file selected (Ensure file is .csv)</p>
                </div>
                <input type="file" id="csvFile" name="file" accept=".csv" class="hidden" required>
            </label>

            <!-- Optional explicit section binding -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Force Section (Optional, leave blank to Auto-Detect)</label>
                <select id="sectionOverride" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition">
                    <option value="">Auto-Detect from File Name (CSE_3_A / CSE_3_B)</option>
                    <option value="A">Force upload as Section A</option>
                    <option value="B">Force upload as Section B</option>
                </select>
            </div>

            <!-- Execute -->
            <button type="submit" id="submitBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 font-bold rounded-xl text-md px-5 py-4 text-center transition shadow-lg shadow-blue-500/30 flex justify-center items-center">
                <span>Start Injection Pipeline</span>
            </button>
        </form>

        <!-- Response Container -->
        <div id="responseContainer" class="mt-6 hidden rounded-xl p-5 border">
            <h3 class="font-bold text-sm mb-2" id="resTitle"></h3>
            <p id="resMessage" class="text-sm"></p>
        </div>
    </div>

    <script>
        // Update file name when selected
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const nameEl = document.getElementById('fileName');
            if (e.target.files.length > 0) {
                nameEl.textContent = "Selected: " + e.target.files[0].name;
                nameEl.classList.add('text-blue-500');
            }
        });

        // Handle Submission
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('csvFile');
            const sectionOverride = document.getElementById('sectionOverride').value;
            const submitBtn = document.getElementById('submitBtn');
            const resContainer = document.getElementById('responseContainer');

            if (fileInput.files.length === 0) return alert('Please select a file first.');

            // Setup Payload
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (sectionOverride) formData.append('section', sectionOverride);

            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing Injection...`;
            resContainer.classList.add('hidden');

            try {
                // Shoot to localhost ERP API
                const response = await fetch('http://localhost:5000/api/data/import-csv', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // UI Success Render
                if (response.ok) {
                    resContainer.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-800');
                    resContainer.classList.add('bg-green-50', 'border-green-200', 'text-green-800');
                    document.getElementById('resTitle').innerText = '✅ SUCCESS';
                    document.getElementById('resMessage').innerHTML = `Assigned to: <b>${data.section}</b><br/>Students Added/Updated: <b>${data.studentsProcessed}</b><br/>Attendance Records Sourced: <b>${data.attendanceRecords}</b>`;
                    fileInput.value = ''; document.getElementById('fileName').textContent = "No file selected";
                } else {
                    throw new Error(data.error || 'Server rejected file.');
                }
            } catch (err) {
                // UI Failure Render
                resContainer.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'text-green-800');
                resContainer.classList.add('bg-red-50', 'border-red-200', 'text-red-800');
                document.getElementById('resTitle').innerText = '❌ INJECTION FAILED';
                document.getElementById('resMessage').innerText = err.message || 'Is your backend running on Port 5000?';
            } finally {
                // Revert UI Loading State
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                submitBtn.innerHTML = `<span>Start Injection Pipeline</span>`;
            }
        });
    </script>
</body>
</html>
